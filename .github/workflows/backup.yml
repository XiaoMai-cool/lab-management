name: 定期数据库备份

on:
  # 每周一和周四早上 9 点（北京时间）自动运行
  schedule:
    - cron: '0 1 * * 1,4'  # UTC 1:00 = 北京时间 9:00
  # 也可以手动触发
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 运行备份脚本
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/backup-data.mjs

      - name: 清理旧备份（只保留最近 10 次）
        run: |
          cd backups
          ls -d */ 2>/dev/null | sort | head -n -10 | xargs -r rm -rf
          echo "当前备份数量: $(ls -d */ 2>/dev/null | wc -l)"

      - name: 提交备份到 GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --staged --quiet; then
            echo "没有新数据变更，跳过提交"
          else
            git commit -m "备份数据库 $(date +%Y-%m-%d)"
            git push
          fi
