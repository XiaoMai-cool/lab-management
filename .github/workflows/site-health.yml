name: 站点健康检查

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 检查站点是否可访问
        id: check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://lab-management-3w7.pages.dev" 2>/dev/null || echo "000")
          echo "status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "✅ 站点正常 (HTTP $HTTP_STATUS)"
          else
            echo "❌ 站点异常 (HTTP $HTTP_STATUS)"
            exit 1
          fi

      - name: 检查 Supabase API 是否可用
        id: check_api
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://lzvhbudvzzigwqysyzha.supabase.co/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" 2>/dev/null || echo "000")
          echo "api_status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "✅ Supabase API 正常 (HTTP $HTTP_STATUS)"
          else
            echo "❌ Supabase API 异常 (HTTP $HTTP_STATUS)"
            exit 1
          fi

      - name: 发送告警邮件
        if: failure()
        env:
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SITE_STATUS: ${{ steps.check.outputs.status }}
          API_STATUS: ${{ steps.check_api.outputs.api_status }}
        run: python3 scripts/send-alert.py
