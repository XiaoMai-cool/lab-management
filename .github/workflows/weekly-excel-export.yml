name: 每周 Excel 数据导出

on:
  schedule:
    # 每周一早上 9:30（北京时间）= UTC 1:30
    - cron: '30 1 * * 1'
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install xlsx

      - name: 导出 Excel 数据
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/export-excel.mjs

      - name: 清理旧导出（只保留最近 8 次）
        run: |
          cd exports
          ls -d */ 2>/dev/null | sort | head -n -8 | xargs -r rm -rf
          echo "当前导出数量: $(ls -d */ 2>/dev/null | wc -l)"

      - name: 提交到 GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exports/
          if git diff --staged --quiet; then
            echo "没有新数据变更，跳过提交"
          else
            git commit -m "导出 Excel 数据 $(date +%Y-%m-%d)"
            git push
          fi
